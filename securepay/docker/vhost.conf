# FILE: docker/vhost.conf
# PURPOSE: Hardened Apache virtual host configuration.
# Copied into the image at: /etc/apache2/sites-available/000-default.conf
#
# This file replaces the default Apache vhost with a security-hardened version.
# It is a real file (not a heredoc) so it is fully auditable and version-controlled.

<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    # ── ROOT DIRECTORY — deny everything by default ───────────
    # Start by denying all access, then explicitly allow the webroot.
    # This "default deny" approach means any directory not listed below
    # is blocked — even if someone adds a new directory later.
    <Directory />
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # ── WEBROOT — allow PHP execution, honour .htaccess ──────
    # -Indexes: never show directory listings (file browser attack)
    # -FollowSymLinks: never follow symlinks (path escape attacks)
    # AllowOverride All: allows .htaccess files (needed for config/ and includes/ blocks)
    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── BLOCK SENSITIVE DIRECTORIES ──────────────────────────
    # Belt-and-suspenders: .htaccess files inside these dirs also block them.
    # Blocking at vhost level means the protection holds even if .htaccess
    # is accidentally deleted or AllowOverride is changed.
    <Directory /var/www/html/config>
        Require all denied
    </Directory>

    <Directory /var/www/html/includes>
        Require all denied
    </Directory>

    # Private storage is completely outside webroot — extra safety
    <Directory /var/www/private>
        Require all denied
    </Directory>

    # ── SECURITY RESPONSE HEADERS ────────────────────────────
    # These are set at Apache level in addition to PHP's security_headers.php.
    # Two layers: if PHP crashes before sending headers, Apache still sends them.
    #
    # X-Content-Type-Options: nosniff
    #   Browser must not guess the content type. Prevents MIME-sniffing attacks
    #   where a file uploaded as an image is interpreted as HTML/JS.
    #
    # X-Frame-Options: DENY
    #   Page cannot be embedded in an iframe. Prevents clickjacking.
    #
    # X-XSS-Protection: 1; mode=block
    #   Enable browser's built-in reflected XSS filter.
    #
    # Referrer-Policy: strict-origin-when-cross-origin
    #   Prevents sensitive URL parameters leaking to third-party sites
    #   via the Referer header.
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    # ── CACHE CONTROL FOR PHP/HTML ────────────────────────────
    # Force browsers not to cache PHP or HTML responses.
    # Without this: user logs out → presses Back → sees cached dashboard.
    # no-store: do not store in cache at all (strongest setting)
    # must-revalidate: if somehow cached, always revalidate with server
    <FilesMatch "\.(php|html)$">
        Header always set Cache-Control "no-store, no-cache, must-revalidate"
        Header always set Pragma        "no-cache"
    </FilesMatch>

    # ── LOGS ─────────────────────────────────────────────────
    # ${APACHE_LOG_DIR} is an Apache environment variable = /var/log/apache2/
    # This is fine as a literal string — Apache expands it at runtime.
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>