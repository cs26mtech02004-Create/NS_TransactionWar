# FILE: docker/vhost.conf

<VirtualHost *:80>
    DocumentRoot /var/www/html
    ServerName localhost

    # Default document — visiting / redirects to login.php
    DirectoryIndex login.php index.php

    # Root: deny everything by default
    <Directory />
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # Webroot: allow access and .htaccess processing
    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # FIXED: config/ and includes/ must have AllowOverride None explicitly.
    # Without it they inherit AllowOverride All from the parent block above,
    # which means a rogue .htaccess inside them could undo the Require all denied.
    <Directory /var/www/html/config>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html/includes>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # Private storage is completely outside DocumentRoot
    <Directory /var/www/private>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # Security response headers
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"

    # No caching for PHP/HTML — prevents seeing cached pages after logout
    <FilesMatch "\.(php|html)$">
        Header always set Cache-Control "no-store, no-cache, must-revalidate"
        Header always set Pragma        "no-cache"
    </FilesMatch>

    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>