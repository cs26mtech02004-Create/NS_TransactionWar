; FILE: docker/security.ini
; PURPOSE: PHP security hardening settings.
; Copied into image at: /usr/local/etc/php/conf.d/security.ini
; PHP loads all .ini files in conf.d/ automatically on startup.
;
; WHY A SEPARATE FILE?
;   Editing the main php.ini is fragile — updates to the base image
;   can overwrite it. A file in conf.d/ is additive and always wins.
;   It is also clearly auditable: all our security settings in one place.

; ── INFORMATION LEAKAGE ───────────────────────────────────────
; Hide PHP version from the X-Powered-By response header.
; Attackers use version numbers to look up known CVEs for that exact version.
expose_php = Off

; ── ERROR HANDLING ────────────────────────────────────────────
; NEVER display errors to users in production.
; Error messages can reveal: file paths, variable names, DB structure,
; SQL query fragments — all useful to an attacker.
display_errors         = Off
display_startup_errors = Off

; Log all errors to a file on the server (not visible to users).
log_errors   = On
error_log    = /var/log/php_errors.log
; E_ALL logs everything — in production you might reduce to E_ERROR,
; but during development E_ALL catches all mistakes.
error_reporting = E_ALL

; ── FILE UPLOADS ──────────────────────────────────────────────
; Hard limit on upload file size at PHP level.
; The app also enforces this in upload_handler.php, but php.ini is
; the floor — requests exceeding this never reach PHP code at all.
file_uploads        = On
upload_max_filesize = 2M
post_max_size       = 3M

; ── SESSION SECURITY ──────────────────────────────────────────
; These reinforce the same settings in config/session.php.
; Belt-and-suspenders: both PHP code AND php.ini enforce these.

; HttpOnly: session cookie cannot be read by JavaScript (blocks XSS cookie theft)
session.cookie_httponly = 1

; FIX #7 — session.cookie_secure:
; Set to 0 for local development (HTTP on localhost).
; Change to 1 when deploying behind HTTPS in production.
; With secure=1 on plain HTTP, the browser never sends the session cookie
; and every page treats you as logged out — very confusing to debug.
session.cookie_secure   = 0

; SameSite=Strict: cookie not sent on cross-site requests (CSRF protection)
session.cookie_samesite = Strict

; Strict mode: reject unknown session IDs (prevents session fixation)
session.use_strict_mode = 1

; Only accept session ID from cookie — never from URL (?PHPSESSID=...)
session.use_only_cookies = 1

; Session expires after 30 minutes of inactivity
session.gc_maxlifetime = 1800

; ── DANGEROUS FUNCTION RESTRICTIONS ──────────────────────────
; Disable PHP functions that execute operating system commands.
; If an attacker achieves Remote Code Execution (RCE), they cannot
; run shell commands, read /etc/passwd, download backdoors, etc.
;
; FIX #4: All on one line — no line breaks or continuations.
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,phpinfo

; ── RESOURCE LIMITS ───────────────────────────────────────────
; Prevent a runaway script from hanging the server indefinitely.
max_execution_time = 30
max_input_time     = 30
memory_limit       = 128M

; ── FILE ACCESS RESTRICTION (open_basedir) ────────────────────
; PHP can only open files within these directories.
; Even if an attacker exploits a path traversal bug in the app,
; PHP will refuse to read files outside these paths.
;
; Allowed paths:
;   /var/www/html    — the application source files
;   /var/www/private — profile uploads and logs
;   /tmp             — PHP's temp directory for file uploads
open_basedir = /var/www/html:/var/www/private:/tmp

; ── REMOTE FILE INCLUSION PREVENTION ─────────────────────────
; Prevent PHP from including or opening remote URLs.
; allow_url_include = On is the enabler for Remote File Inclusion (RFI) attacks
; where an attacker tricks PHP into including a malicious remote script.
allow_url_include = Off
allow_url_fopen   = Off