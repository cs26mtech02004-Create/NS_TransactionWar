# FILE: docker/ssl-vhost.conf
# Port 443 — main application vhost over TLS.

<VirtualHost *:443>
    DocumentRoot /var/www/html
    ServerName localhost

    # ── TLS CONFIGURATION ─────────────────────────────────────
    SSLEngine             on
    SSLCertificateFile    /etc/apache2/ssl/cert.pem
    SSLCertificateKeyFile /etc/apache2/ssl/key.pem

    # Modern TLS only — disable old insecure protocol versions
    SSLProtocol           all -SSLv3 -TLSv1 -TLSv1.1
    SSLCipherSuite        HIGH:!aNULL:!MD5:!3DES
    SSLHonorCipherOrder   on

    # ── DIRECTORY INDEX ────────────────────────────────────────
    DirectoryIndex login.php index.php

    # ── DEFAULT DENY ──────────────────────────────────────────
    <Directory />
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # ── WEBROOT ───────────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes -FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── BLOCK SENSITIVE DIRS (AllowOverride None explicit) ────
    <Directory /var/www/html/config>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html/includes>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # ── PRIVATE STORAGE (outside webroot, belt+suspenders) ───
    <Directory /var/www/private>
        Options -Indexes -FollowSymLinks
        AllowOverride None
        Require all denied
    </Directory>

    # ── SECURITY HEADERS ──────────────────────────────────────
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-Frame-Options         "DENY"
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Referrer-Policy         "strict-origin-when-cross-origin"
    # HSTS: tell the browser to always use HTTPS for this host for 1 year
    # Only safe once you are sure HTTPS works — do not set prematurely
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    # ── CACHE CONTROL ─────────────────────────────────────────
    <FilesMatch "\.(php|html)$">
        Header always set Cache-Control "no-store, no-cache, must-revalidate"
        Header always set Pragma        "no-cache"
    </FilesMatch>

    # ── LOGS ──────────────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

</VirtualHost>