services:
  app:
    build: .
    ports:
      - "8081:80"
    environment:
      - DB_HOST=db
      - DB_NAME=users
      - DB_USER=root
      - DB_PASS=root
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: users
      MYSQL_ROOT_PASSWORD: root  # This is the only line needed for root
